name: Import Meta branch and build linown-1

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-linown-1.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VERSION: linown-1
      REALITY_VERSION: 26.7.11
      CGO_ENABLED: 0

    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4
        with:
          fetch