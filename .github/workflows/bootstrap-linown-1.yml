name: Build linown-1 ARM64

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: linown-1
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Patch Reality version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('component/tls/reality.go')
          s=p.read_text()
          s=s.replace('const RealityMaxShortIDLen = 8','const RealityMaxShortIDLen = 8\n\nvar realityClientVersion = [3]byte{26, 7, 11}')
          s=s.replace('hello.SessionId[0] = 1\n\t\thello.SessionId[1] = 8\n\t\thello.SessionId[2] = 2','copy(hello.SessionId[:3], realityClientVersion[:])')
          p.write_text(s)
          PY
          gofmt -w component/tls/reality.go
      - name: Build
        run: |
          go test ./component/tls/...
          GOOS=linux GOARCH=arm64 go build -tags with_gvisor -ldflags "-s -w -X github.com/metacubex/mihomo/constant.Version=${VERSION}" -o mihomo-linux-arm64 .
          gzip -9 -f mihomo-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: mihomo-linux-arm64-linown-1
          path: mihomo-linux-arm64.gz
