name: build-linown-1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: |
          chmod +x scripts/build-linown.sh
          scripts/build-linown.sh
      - uses: actions/upload-artifact@v4
        with:
          name: mihomo-linown-1
          path: /tmp/linown-release
